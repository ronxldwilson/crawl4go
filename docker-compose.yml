services:
  crawl4go:
    image: ronxldwilson/crawl4go:latest
    build: .
    ports:
      - "8082:8082"
    environment:
      - CRAWL4GO_PORT=8082
      - ZENPANDA_URL=http://zenpanda:9222
      - TOR_PROXY_URL=http://tor-proxy:3128
      - DEFAULT_WAIT_MS=1500
      - MAX_CONCURRENT=4
      - REQUEST_TIMEOUT_MS=30000
    depends_on:
      zenpanda:
        condition: service_started
      tor-proxy:
        condition: service_healthy
    restart: unless-stopped

  zenpanda:
    image: ronxldwilson/zenpanda:latest
    ports:
      - "9222:9222"
    restart: unless-stopped

  tor-proxy:
    image: ronxldwilson/tor-proxy-pool:latest
    ports:
      - "3128:3128"
      - "4444:4444"
    environment:
      - TOR_INSTANCES=500
      - TOR_REBUILD_INTERVAL=1800
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
