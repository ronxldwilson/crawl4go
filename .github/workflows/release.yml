name: Release Pipeline
on:
  push:
    tags:
      - 'v*'
      - '!test-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o crawl4go-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/crawl4go/
      - uses: actions/upload-artifact@v4
        with:
          name: crawl4go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: crawl4go-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: crawl4go-*
          body: |
            ## crawl4go ${{ github.ref_name }}

            ### Installation
            Download the binary for your platform and make it executable:
            ```bash
            chmod +x crawl4go-*
            ```

            ### Docker
            ```bash
            docker pull ronxldwilson/crawl4go:${{ github.ref_name }}
            ```
          token: ${{ secrets.GITHUB_TOKEN }}
